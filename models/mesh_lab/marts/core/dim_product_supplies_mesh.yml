version: 2

models:
  - name: dim_product_supplies_mesh
    config:
      contract:
        enforced: true
    columns:
      - name: sku
        data_type: varchar
        constraints:
          - type: not_null
      - name: product_name
        data_type: varchar
      - name: product_type
        data_type: varchar
      - name: supply_id
        data_type: varchar
      - name: supply_name
        data_type: varchar
      - name: supply_cost
        data_type: number
      - name: perishable
        data_type: boolean