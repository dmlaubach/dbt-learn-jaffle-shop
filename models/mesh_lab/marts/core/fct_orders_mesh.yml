version: 2

models:
  - name: fct_orders_mesh
    latest_version: 2
    config:
      contract:
        enforced: true
    columns:
      - name: order_id
        data_type: varchar
        constraints:
          - type: not_null
      - name: customer_id
        data_type: varchar
      - name: ordered_at
        data_type: timestamp_ntz
      - name: store_name
        data_type: varchar
      - name: count_items
        data_type: integer
      - name: subtotal
        data_type: number
      - name: tax_paid
        data_type: number
      - name: raw_subtotal
        data_type: number
      - name: raw_tax_paid
        data_type: number
      - name: subtotal_variance
        data_type: number
      - name: is_subtotal_reconciled
        data_type: boolean

    versions:
      - v: 1
        deprecation_date: 2026-12-10
        config: 
          alias: fct_orders_mesh_v1
      - v: 2
        config: 
          alias: fct_orders_mesh
        columns:
          - name: order_date
            data_type: date
          - include: all
            exclude: [ordered_at]
