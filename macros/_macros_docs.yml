version: 2

macros:
  - name: cents_to_dollars
    description: "Converts cents to dollars and rounds."
    arguments:
      - name: column_name
        type: string
        description: "The name of the column you want to convert"
      - name: decimals
        type: integer
        description: "Number of decimal places, defaults to 2"

  - name: grant_select
    description: "Grants select privs on schema to role unless otherwise specified"
    arguments:
      - name: schema
        type: string
        description: "The schema to grant privs on"
      - name: role
        type: string
        description: "The role to grant privs to"